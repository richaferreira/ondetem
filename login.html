<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Onde Tem?</title>
<link rel="stylesheet" href="stylesheet_login.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#553A73,#7d5a9e);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card-login{background:#fff;border-radius:18px;padding:35px;box-shadow:0 20px 60px rgba(0,0,0,.2);max-width:430px;width:100%}
  h1{color:#553A73;font-weight:600;margin-bottom:6px;font-size:1.5rem}
  p.sub{color:#888;margin-bottom:22px;font-size:.9rem}
  .tipos{display:flex;gap:6px;background:#f3f3f7;padding:5px;border-radius:10px;margin-bottom:20px}
  .tipo-tab{flex:1;padding:9px;border:none;background:transparent;border-radius:7px;font-weight:500;cursor:pointer;font-size:.85rem;color:#666}
  .tipo-tab.active{background:#553A73;color:#fff}
  input{width:100%;padding:12px 14px;border:1px solid #ddd;border-radius:8px;margin-bottom:12px;font-size:.95rem}
  input:focus{outline:none;border-color:#553A73}
  .btn-login{width:100%;background:#553A73;color:#fff;border:none;padding:13px;border-radius:8px;font-weight:600;cursor:pointer;font-size:.95rem;margin-top:6px}
  .btn-login:hover{background:#3d2854}
  .erro{background:#ffebee;color:#c62828;padding:10px;border-radius:6px;font-size:.85rem;margin-bottom:12px;display:none}
  .erro.show{display:block}
  .cadastros{display:flex;gap:8px;margin-top:18px}
  .PF_PJ{flex:1;background:#fff;border:1px solid #553A73;color:#553A73;padding:10px;border-radius:8px;font-weight:500;cursor:pointer;font-size:.85rem}
  .PF_PJ:hover{background:#553A73;color:#fff}
  .voltar-link{text-align:center;margin-top:18px}
  .voltar-link a{color:#553A73;text-decoration:none;font-size:.85rem}
  .test-creds{background:#f8f4ff;border-left:3px solid #553A73;padding:10px;border-radius:6px;font-size:.78rem;color:#666;margin-bottom:14px;line-height:1.5}
</style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="chat-widget.css">
</head>
<body>
<div class="card-login">
  <h1>Bem-vindo!</h1>
  <p class="sub">Entre na sua conta para continuar</p>

  <div class="test-creds">
    <strong>Credenciais de teste:</strong><br>
    Admin: admin@ondetem.com / 123456<br>
    Empresa: empresa@ondetem.com / 123456<br>
    Usuário: joao@email.com / 123456
  </div>

  <div class="tipos">
    <button class="tipo-tab active" data-tipo="usuario" onclick="selecionarTipo('usuario')">Usuário</button>
    <button class="tipo-tab" data-tipo="empresa" onclick="selecionarTipo('empresa')">Empresa</button>
    <button class="tipo-tab" data-tipo="admin" onclick="selecionarTipo('admin')">Admin</button>
  </div>

  <div class="erro" id="loginErro"></div>
  <input type="email" id="loginEmail" placeholder="E-mail" autocomplete="username">
  <input type="password" id="loginSenha" placeholder="Senha" autocomplete="current-password">
  <button class="btn-login" id="btnLogin" onclick="fazerLogin()">Login | Acessar</button>

  <div class="cadastros">
    <button class="PF_PJ" onclick="window.location.href='cadastro-usuario.html'">Cadastrar usuário</button>
    <button class="PF_PJ" onclick="window.location.href='cadastro-empresa.html'">Cadastrar empresa</button>
  </div>
  <div class="voltar-link"><a href="index.html">← Voltar ao site</a></div>
</div>

<script src="auth-guard.js"></script>
<script>
let tipoSelecionado='usuario';
function selecionarTipo(t){
  tipoSelecionado=t;
  document.querySelectorAll('.tipo-tab').forEach(x=>x.classList.remove('active'));
  document.querySelector(`[data-tipo="${t}"]`).classList.add('active');
  esconderErro();
}
function destinoPorTipo(tipo){
  const params = new URLSearchParams(location.search);
  const redirect = params.get('redirect');
  if (redirect) return redirect;
  if (tipo==='admin') return '/admin';
  if (tipo==='empresa') return '/painel-empresa';
  return '/';
}
async function fazerLogin(){
  const email=loginEmail.value.trim(), senha=loginSenha.value;
  if(!email||!senha){mostrarErro('Preencha o e-mail e a senha.');return;}
  if(!window.OndeTemAuth){
    mostrarErro('Falha ao carregar módulo de autenticação. Recarregue a página (Ctrl+Shift+R).');
    return;
  }
  if(!location.protocol.startsWith('http')){
    mostrarErro('Abra a página via http://localhost:3000/login — o login só funciona com o servidor rodando.');
    return;
  }
  btnLogin.disabled=true; btnLogin.textContent='Entrando...'; esconderErro();
  let resposta;
  try{
    resposta = await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,senha,tipo:tipoSelecionado})});
  }catch(erroRede){
    console.error('[login] falha de rede:', erroRede);
    mostrarErro('Erro de conexão. Verifique se o servidor está rodando em http://localhost:3000.');
    btnLogin.disabled=false; btnLogin.textContent='Login | Acessar';
    return;
  }
  try{
    const data = await resposta.json();
    if(resposta.ok){
      OndeTemAuth.salvarSessao(data.token, data.usuario);
      window.location.href = destinoPorTipo(data.usuario.tipo);
      return;
    }
    mostrarErro(data.erro || 'E-mail ou senha incorretos.');
  }catch(erroParse){
    console.error('[login] resposta inválida do servidor:', erroParse);
    mostrarErro('Resposta inválida do servidor (status ' + resposta.status + '). Tente novamente.');
  }finally{
    btnLogin.disabled=false; btnLogin.textContent='Login | Acessar';
  }
}
function mostrarErro(m){loginErro.textContent=m;loginErro.classList.add('show');}
function esconderErro(){loginErro.classList.remove('show');}
document.addEventListener('keydown',e=>{if(e.key==='Enter')fazerLogin();});
</script>
  <script src="chat-widget.js"></script>
</body>
</html>
