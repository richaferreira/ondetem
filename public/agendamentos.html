<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Agendamentos - Onde Tem?</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#553A73">
  
  <style>
    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
    }

    .header-agendamentos {
      background: linear-gradient(135deg, #553A73 0%, #7d5a9e 100%);
      color: white;
      padding: 30px 0;
      margin-bottom: 30px;
      box-shadow: 0 4px 15px rgba(85, 58, 115, 0.2);
    }

    .header-agendamentos h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .header-agendamentos p {
      font-size: 1rem;
      opacity: 0.9;
      margin: 0;
    }

    .agendamento-card {
      border: none;
      border-radius: 15px;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
      border-left: 5px solid #553A73;
      background: white;
    }

    .agendamento-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(85, 58, 115, 0.2);
    }

    .agendamento-card.confirmado {
      border-left-color: #28a745;
    }

    .agendamento-card.pendente {
      border-left-color: #ffc107;
    }

    .agendamento-card.cancelado {
      border-left-color: #dc3545;
      opacity: 0.7;
    }

    .card-header-agendamento {
      background: linear-gradient(135deg, #553A73 0%, #7d5a9e 100%);
      color: white;
      padding: 15px 20px;
      border-bottom: none;
    }

    .card-header-agendamento h5 {
      margin: 0;
      font-weight: 600;
      font-size: 1.1rem;
    }

    .badge-status {
      font-size: 0.85rem;
      padding: 0.5rem 0.75rem;
      border-radius: 20px;
      font-weight: 600;
    }

    .info-agendamento {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
      padding: 10px;
      background: #f8f9fa;
      border-radius: 8px;
      transition: all 0.3s ease;
    }

    .info-agendamento:hover {
      background: #e9ecef;
    }

    .info-agendamento i {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #553A73;
      color: white;
      border-radius: 50%;
      margin-right: 15px;
      font-size: 1.2rem;
    }

    .info-agendamento-texto {
      flex: 1;
    }

    .info-agendamento-texto label {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 3px;
      display: block;
      font-weight: 600;
    }

    .info-agendamento-texto span {
      font-size: 1rem;
      color: #333;
      font-weight: 500;
    }

    .vazio-container {
      text-align: center;
      padding: 80px 20px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .vazio-container i {
      font-size: 5rem;
      color: #ccc;
      margin-bottom: 20px;
      display: block;
    }

    .vazio-container h4 {
      color: #666;
      margin-bottom: 10px;
    }

    .vazio-container p {
      color: #999;
      margin-bottom: 30px;
    }

    .btn-acao {
      padding: 8px 15px;
      font-size: 0.9rem;
      border-radius: 8px;
      transition: all 0.3s ease;
      margin: 5px;
    }

    .btn-acao:hover {
      transform: scale(1.05);
    }

    .stats-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
    }

    .stat-card i {
      font-size: 2rem;
      color: #553A73;
      margin-bottom: 10px;
      display: block;
    }

    .stat-card .numero {
      font-size: 1.8rem;
      font-weight: 700;
      color: #553A73;
    }

    .stat-card .label {
      font-size: 0.9rem;
      color: #666;
      margin-top: 5px;
    }

    .filtro-container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .filtro-btn {
      margin: 5px;
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 0.9rem;
      transition: all 0.3s ease;
    }

    .filtro-btn.ativo {
      background-color: #553A73;
      color: white;
    }

    @media (max-width: 768px) {
      .header-agendamentos h1 {
        font-size: 1.5rem;
      }

      .stats-container {
        grid-template-columns: repeat(2, 1fr);
      }

      .agendamento-card {
        margin-bottom: 15px;
      }
    }

    .modal-header {
      background: linear-gradient(135deg, #553A73 0%, #7d5a9e 100%);
      color: white;
    }

    .modal-header .btn-close {
      filter: brightness(0) invert(1);
    }
  </style>
</head>

<body>
  <!-- Header -->
  <div class="header-agendamentos">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
          <h1><i class="bi bi-calendar-check"></i> Meus Agendamentos</h1>
          <p>Gerencie seus agendamentos de serviços estéticos</p>
        </div>
        <a href="index.html" class="btn btn-light btn-sm rounded-pill">
          <i class="bi bi-house-door"></i> Voltar
        </a>
      </div>
    </div>
  </div>

  <!-- Conteúdo Principal -->
  <main class="container py-4 pb-5">
    <!-- Estatísticas -->
    <div class="stats-container" id="statsContainer"></div>

    <!-- Filtros -->
    <div class="filtro-container" id="filtrosContainer"></div>

    <!-- Lista de Agendamentos -->
    <div id="agendamentosContainer"></div>
  </main>

  <!-- Barra de navegação mobile -->
  <nav class="fixed-bottom bg-white d-md-none border-top py-2 bottom-nav">
    <div class="container-fluid d-flex justify-content-around text-center">
      <a href="index.html" class="nav-link-custom text-muted">
        <i class="bi bi-house-door-fill fs-4"></i>
        <span class="small d-block">Início</span>
      </a>
      <a href="#" class="nav-link-custom text-muted">
        <i class="bi bi-search fs-4"></i>
        <span class="small d-block">Buscar</span>
      </a>
      <a href="agendamentos.html" class="nav-link-custom text-danger">
        <i class="bi bi-calendar-check fs-4"></i>
        <span class="small d-block">Agendamentos</span>
      </a>
      <a href="#" class="nav-link-custom text-muted">
        <i class="bi bi-person fs-4"></i>
        <span class="small d-block">Perfil</span>
      </a>
    </div>
  </nav>

  <!-- Modal de Detalhes -->
  <div class="modal fade" id="modalDetalhes" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Detalhes do Agendamento</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
          <button type="button" class="btn btn-danger" id="btnCancelarAgendamento">Cancelar Agendamento</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="config.js"></script>
  <script src="utils.js"></script>
  <script>
    let agendamentoSelecionado = null;
    let filtroAtivo = null;

    // HTML sanitization helper to prevent XSS
    function esc(str) {
      return String(str).replace(/[<>"'&]/g, c => ({'<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;','&':'&amp;'})[c]);
    }

    // Carregar agendamentos ao abrir a página
    document.addEventListener('DOMContentLoaded', () => {
      carregarAgendamentos();
      renderizarEstatisticas();
      renderizarFiltros();
    });

    function renderizarEstatisticas() {
      const agendamentos = obterAgendamentos();
      const confirmados = agendamentos.filter(a => a.status === 'confirmado').length;
      const pendentes = agendamentos.filter(a => a.status === 'pendente').length;
      const cancelados = agendamentos.filter(a => a.status === 'cancelado').length;

      const html = `
        <div class="stat-card">
          <i class="bi bi-calendar-check"></i>
          <div class="numero">${agendamentos.length}</div>
          <div class="label">Total</div>
        </div>
        <div class="stat-card">
          <i class="bi bi-check-circle" style="color: #28a745;"></i>
          <div class="numero">${confirmados}</div>
          <div class="label">Confirmados</div>
        </div>
        <div class="stat-card">
          <i class="bi bi-clock" style="color: #ffc107;"></i>
          <div class="numero">${pendentes}</div>
          <div class="label">Pendentes</div>
        </div>
        <div class="stat-card">
          <i class="bi bi-x-circle" style="color: #dc3545;"></i>
          <div class="numero">${cancelados}</div>
          <div class="label">Cancelados</div>
        </div>
      `;

      document.getElementById('statsContainer').innerHTML = html;
    }

    function renderizarFiltros() {
      const html = `
        <div class="d-flex flex-wrap align-items-center">
          <label class="me-3 fw-bold">Filtrar por:</label>
          <button class="filtro-btn ativo" onclick="filtrarAgendamentos(null)">
            <i class="bi bi-funnel"></i> Todos
          </button>
          <button class="filtro-btn" onclick="filtrarAgendamentos('confirmado')">
            <i class="bi bi-check-circle"></i> Confirmados
          </button>
          <button class="filtro-btn" onclick="filtrarAgendamentos('pendente')">
            <i class="bi bi-clock"></i> Pendentes
          </button>
          <button class="filtro-btn" onclick="filtrarAgendamentos('cancelado')">
            <i class="bi bi-x-circle"></i> Cancelados
          </button>
          <button class="filtro-btn ms-auto" onclick="limparAgendamentosConfirm()">
            <i class="bi bi-trash"></i> Limpar Todos
          </button>
        </div>
      `;

      document.getElementById('filtrosContainer').innerHTML = html;
    }

    function carregarAgendamentos() {
      const agendamentos = obterAgendamentos();
      const container = document.getElementById('agendamentosContainer');

      if (agendamentos.length === 0) {
        container.innerHTML = `
          <div class="vazio-container">
            <i class="bi bi-calendar-x"></i>
            <h4>Nenhum agendamento realizado</h4>
            <p>Comece a agendar seus serviços favoritos agora mesmo!</p>
            <a href="index.html" class="btn btn-danger rounded-pill">
              <i class="bi bi-calendar-plus"></i> Fazer Agendamento
            </a>
          </div>
        `;
        return;
      }

      let html = '';
      const agendamentosOrdenados = agendamentos.sort((a, b) => new Date(b.data) - new Date(a.data));

      agendamentosOrdenados.forEach((agendamento) => {
        const statusClass = agendamento.status || 'confirmado';
        const statusLabel = {
          'confirmado': 'Confirmado',
          'pendente': 'Pendente',
          'cancelado': 'Cancelado'
        }[statusClass] || 'Confirmado';

        const statusIcon = {
          'confirmado': 'check-circle',
          'pendente': 'clock',
          'cancelado': 'x-circle'
        }[statusClass] || 'check-circle';

        const statusColor = {
          'confirmado': 'success',
          'pendente': 'warning',
          'cancelado': 'danger'
        }[statusClass] || 'success';

        const estabelecimento = ESTABELECIMENTOS.find(e => e.id === agendamento.estabelecimentoId);
        const telefone = estabelecimento ? estabelecimento.telefone : 'N/A';

        html += `
          <div class="card agendamento-card ${statusClass}" onclick="mostrarDetalhes(${agendamento.id})">
            <div class="card-header-agendamento">
              <div class="d-flex justify-content-between align-items-center">
                <h5>${esc(agendamento.estabelecimento)}</h5>
                <span class="badge badge-status bg-${statusColor}">
                  <i class="bi bi-${statusIcon}"></i> ${statusLabel}
                </span>
              </div>
            </div>
            <div class="card-body">
              <div class="info-agendamento">
                <i class="bi bi-calendar-event"></i>
                <div class="info-agendamento-texto">
                  <label>Data</label>
                  <span>${formatarData(agendamento.data)}</span>
                </div>
              </div>

              <div class="info-agendamento">
                <i class="bi bi-clock"></i>
                <div class="info-agendamento-texto">
                  <label>Horário</label>
                  <span>${esc(agendamento.hora)}</span>
                </div>
              </div>

              <div class="info-agendamento">
                <i class="bi bi-wallet2"></i>
                <div class="info-agendamento-texto">
                  <label>Método de Pagamento</label>
                  <span>${esc(obterLabelPagamento(agendamento.pagamento))}</span>
                </div>
              </div>

              <div class="info-agendamento">
                <i class="bi bi-telephone"></i>
                <div class="info-agendamento-texto">
                  <label>Contato</label>
                  <span>${esc(telefone)}</span>
                </div>
              </div>

              <div class="d-flex justify-content-end gap-2 mt-3">
                <button class="btn btn-sm btn-outline-primary btn-acao" onclick="copiarDetalhes(${agendamento.id})">
                  <i class="bi bi-clipboard"></i> Copiar
                </button>
                <button class="btn btn-sm btn-outline-danger btn-acao" onclick="removerAgendamentoConfirm(${agendamento.id})">
                  <i class="bi bi-trash"></i> Remover
                </button>
              </div>
            </div>
          </div>
        `;
      });

      container.innerHTML = html;
    }

    function filtrarAgendamentos(status) {
      const agendamentos = obterAgendamentos();
      const container = document.getElementById('agendamentosContainer');
      filtroAtivo = status;

      // Atualizar botões de filtro
      document.querySelectorAll('.filtro-btn').forEach(btn => {
        btn.classList.remove('ativo');
      });
      event.target.closest('.filtro-btn').classList.add('ativo');

      if (!status) {
        carregarAgendamentos();
        return;
      }

      const agendamentosFiltrados = agendamentos.filter(a => (a.status || 'confirmado') === status);

      if (agendamentosFiltrados.length === 0) {
        container.innerHTML = `
          <div class="vazio-container">
            <i class="bi bi-search"></i>
            <h4>Nenhum agendamento encontrado</h4>
            <p>Não há agendamentos com o status selecionado.</p>
          </div>
        `;
        return;
      }

      let html = '';
      agendamentosFiltrados.forEach((agendamento) => {
        // Reutilizar HTML do carregarAgendamentos
        const statusClass = agendamento.status || 'confirmado';
        const statusLabel = {
          'confirmado': 'Confirmado',
          'pendente': 'Pendente',
          'cancelado': 'Cancelado'
        }[statusClass] || 'Confirmado';

        const statusIcon = {
          'confirmado': 'check-circle',
          'pendente': 'clock',
          'cancelado': 'x-circle'
        }[statusClass] || 'check-circle';

        const statusColor = {
          'confirmado': 'success',
          'pendente': 'warning',
          'cancelado': 'danger'
        }[statusClass] || 'success';

        const estabelecimento = ESTABELECIMENTOS.find(e => e.id === agendamento.estabelecimentoId);
        const telefone = estabelecimento ? estabelecimento.telefone : 'N/A';

        html += `
          <div class="card agendamento-card ${statusClass}" onclick="mostrarDetalhes(${agendamento.id})">
            <div class="card-header-agendamento">
              <div class="d-flex justify-content-between align-items-center">
                <h5>${esc(agendamento.estabelecimento)}</h5>
                <span class="badge badge-status bg-${statusColor}">
                  <i class="bi bi-${statusIcon}"></i> ${statusLabel}
                </span>
              </div>
            </div>
            <div class="card-body">
              <div class="info-agendamento">
                <i class="bi bi-calendar-event"></i>
                <div class="info-agendamento-texto">
                  <label>Data</label>
                  <span>${formatarData(agendamento.data)}</span>
                </div>
              </div>

              <div class="info-agendamento">
                <i class="bi bi-clock"></i>
                <div class="info-agendamento-texto">
                  <label>Horário</label>
                  <span>${esc(agendamento.hora)}</span>
                </div>
              </div>

              <div class="info-agendamento">
                <i class="bi bi-wallet2"></i>
                <div class="info-agendamento-texto">
                  <label>Método de Pagamento</label>
                  <span>${esc(obterLabelPagamento(agendamento.pagamento))}</span>
                </div>
              </div>

              <div class="info-agendamento">
                <i class="bi bi-telephone"></i>
                <div class="info-agendamento-texto">
                  <label>Contato</label>
                  <span>${esc(telefone)}</span>
                </div>
              </div>

              <div class="d-flex justify-content-end gap-2 mt-3">
                <button class="btn btn-sm btn-outline-primary btn-acao" onclick="copiarDetalhes(${agendamento.id})">
                  <i class="bi bi-clipboard"></i> Copiar
                </button>
                <button class="btn btn-sm btn-outline-danger btn-acao" onclick="removerAgendamentoConfirm(${agendamento.id})">
                  <i class="bi bi-trash"></i> Remover
                </button>
              </div>
            </div>
          </div>
        `;
      });

      container.innerHTML = html;
    }

    function mostrarDetalhes(id) {
      agendamentoSelecionado = obterAgendamentoPorId(id);
      if (!agendamentoSelecionado) return;

      const estabelecimento = ESTABELECIMENTOS.find(e => e.id === agendamentoSelecionado.estabelecimentoId);
      
      const html = `
        <p><strong>Estabelecimento:</strong> ${esc(agendamentoSelecionado.estabelecimento)}</p>
        <p><strong>Data:</strong> ${formatarData(agendamentoSelecionado.data)}</p>
        <p><strong>Horário:</strong> ${esc(agendamentoSelecionado.hora)}</p>
        <p><strong>Método de Pagamento:</strong> ${esc(obterLabelPagamento(agendamentoSelecionado.pagamento))}</p>
        <p><strong>Status:</strong> ${esc(agendamentoSelecionado.status || 'Confirmado')}</p>
        <p><strong>Agendado em:</strong> ${esc(agendamentoSelecionado.timestamp)}</p>
        ${estabelecimento ? `<p><strong>Contato:</strong> ${esc(estabelecimento.telefone)}</p>` : ''}
        ${estabelecimento ? `<p><strong>Endereço:</strong> ${esc(estabelecimento.endereco)}</p>` : ''}
      `;

      document.getElementById('modalBody').innerHTML = html;
      new bootstrap.Modal(document.getElementById('modalDetalhes')).show();
    }

    function removerAgendamentoConfirm(id) {
      if (confirm('Tem certeza que deseja remover este agendamento?')) {
        removerAgendamento(id);
        carregarAgendamentos();
        renderizarEstatisticas();
      }
    }

    function limparAgendamentosConfirm() {
      if (confirm('Tem certeza que deseja limpar TODOS os agendamentos? Esta ação não pode ser desfeita.')) {
        limparAgendamentos();
        carregarAgendamentos();
        renderizarEstatisticas();
        renderizarFiltros();
      }
    }

    function copiarDetalhes(id) {
      const agendamento = obterAgendamentoPorId(id);
      if (!agendamento) return;

      const texto = `
Agendamento - Onde Tem?
Estabelecimento: ${agendamento.estabelecimento}
Data: ${formatarData(agendamento.data)}
Horário: ${agendamento.hora}
Pagamento: ${obterLabelPagamento(agendamento.pagamento)}
Status: ${agendamento.status || 'Confirmado'}
      `.trim();

      copiarParaClipboard(texto).then(() => {
        alert('Detalhes copiados para a área de transferência!');
      });
    }
  </script>
</body>
</html>
